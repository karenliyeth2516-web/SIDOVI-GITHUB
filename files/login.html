<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso Personal – SIDOVI</title>
  <link rel="stylesheet" href="estilos.css" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body class="login-page">

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <img src="l" alt="Logo SIDOVI" class="brand-logo" />
      </div>
      <nav aria-label="Navegación principal">
        <ul class="nav-list">
          <li><a href="index.html" class="nav-link">Inicio</a></li>
          <li><a href="ofertas.html" class="nav-link">Ofertas</a></li>
          <li><a href="postulacion.html" class="nav-link">Postularse</a></li>
          <li><a href="login.html" class="nav-link nav-cta active" aria-current="page">Acceso Personal</a></li>
        </ul>
      </nav>
      <button class="menu-toggle" aria-label="Abrir menú" id="menuToggle">&#9776;</button>
    </div>
  </header>

  <main class="login-main">
    <section class="login-section" aria-labelledby="login-title">
      <div class="login-card">

        <div class="login-brand">
          <img src="colviseg.png" alt="Logo Colviseg" class="login-shield" />
          <h1 id="login-title">Acceso <span class="accent">Restringido</span></h1>
          <p>Ingresa con tus credenciales autorizadas</p>
        </div>

        <div id="login-alert" class="form-alert" role="alert" aria-live="polite" hidden></div>

        <div class="login-form" id="loginForm">

          <div class="field">
            <label for="login-user">Usuario o Correo <span class="required">*</span></label>
            <input type="text" id="login-user" name="usuario" placeholder="usuario@colviseg.com" required />
          </div>

          <div class="field">
            <label for="login-pass">Contraseña <span class="required">*</span></label>
            <div class="pass-wrapper">
              <input type="password" id="login-pass" name="contrasena" placeholder="••••••••" required />
              <button type="button" class="toggle-pass" id="togglePass">👁</button>
            </div>
          </div>

          <div class="field">
            <label for="login-rol">Rol <span class="required">*</span></label>
            <select id="login-rol" name="rol" required>
              <option value="" disabled selected>Selecciona tu rol</option>
              <option value="rrhh">RRHH</option>
              <option value="gerente">Gerente</option>
            </select>
          </div>

          <div class="login-actions">
            <button type="button" class="btn btn-primary full-btn" id="btnLogin">Ingresar al Sistema</button>
          </div>

          <p class="login-back"><a href="index.html">← Volver al inicio</a></p>
        </div>

        <!-- ACCESO DENEGADO -->
        <div class="login-denied" id="loginDenied" hidden>
          <div class="denied-icon">🔒</div>
          <h2>Acceso Denegado</h2>
          <p>Las credenciales ingresadas no son válidas.</p>
          <button type="button" class="btn btn-outline" id="btnRetry">Intentar de Nuevo</button>
        </div>

        <!-- ACCESO CONCEDIDO -->
        <div class="login-success" id="loginSuccess" hidden>
          <div class="success-icon">✅</div>
          <h2>Bienvenido al Sistema</h2>
          <p id="welcomeMsg">Redirigiendo...</p>
        </div>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <img src="logo_sidovi.png" class="footer-logo" />
      <p>&copy; 2025 SIDOVI · Colviseg Ltda.</p>
    </div>
  </footer>

  <script>
    const toggle = document.getElementById('menuToggle');
    const navList = document.querySelector('.nav-list');
    toggle.addEventListener('click', () => navList.classList.toggle('open'));

    document.getElementById('togglePass').addEventListener('click', () => {
      const passInput = document.getElementById('login-pass');
      passInput.type = passInput.type === 'password' ? 'text' : 'password';
    });

    const mockUsers = {
      rrhh: { user: 'rrhh@colviseg.com', pass: 'rrhh123' },
      gerente: { user: 'gerente@colviseg.com', pass: 'gerente123' }
    };

    document.getElementById('btnLogin').addEventListener('click', () => {
      const user = document.getElementById('login-user').value.trim();
      const pass = document.getElementById('login-pass').value;
      const rol = document.getElementById('login-rol').value;
      const alertBox = document.getElementById('login-alert');

      if (!user || !pass || !rol) {
        alertBox.textContent = '⚠️ Completa todos los campos';
        alertBox.hidden = false;
        return;
      }

      alertBox.hidden = true;
      const mock = mockUsers[rol];
      const valid = mock && user === mock.user && pass === mock.pass;

      document.getElementById('loginForm').hidden = true;

      if (valid) {
        const successDiv = document.getElementById('loginSuccess');
        document.getElementById('welcomeMsg').textContent =
          `Has ingresado como ${rol.toUpperCase()}. Redirigiendo...`;
        successDiv.hidden = false;

        // 🔥 AQUÍ ESTÁ LA SOLUCIÓN
        setTimeout(() => {
          if (rol === "rrhh") {
            window.location.href = "RRHH.html";
          } else if (rol === "gerente") {
            window.location.href = "gerente.html";
          }
        }, 2000);

      } else {
        document.getElementById('loginDenied').hidden = false;
      }
    });

    document.getElementById('btnRetry').addEventListener('click', () => {
      document.getElementById('loginDenied').hidden = true;
      document.getElementById('loginForm').hidden = false;
      document.getElementById('login-pass').value = '';
    });
  </script>

</body>
</html>
